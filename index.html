<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Verse Hero Gallery</title>
    <meta name="description" content="Galería dinámica de héroes del Marvel Universe con vista grid y feed.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">
                <span class="title-spider">Spider</span><span class="title-verse">-Verse</span>
                <span class="title-gallery">Gallery</span>
            </h1>
            <!-- Toggle Grid / Feed -->
            <div class="view-toggle" role="group" aria-label="Cambiar vista">
                <button id="btnGrid" class="toggle-btn active" onclick="setView('grid')" aria-pressed="true">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z"/></svg>
                    Grid
                </button>
                <button id="btnFeed" class="toggle-btn" onclick="setView('feed')" aria-pressed="false">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M4 5h16v2H4zm0 6h16v2H4zm0 6h16v2H4z"/></svg>
                    Feed
                </button>
            </div>
        </div>
    </header>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen" class="loading-screen" aria-live="polite">
        <div class="web-spinner">
            <svg class="web-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="40" stroke="var(--accent)" stroke-width="2" fill="none" stroke-dasharray="60 200" stroke-linecap="round">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="1.2s" repeatCount="indefinite"/>
                </circle>
                <path d="M50 10 L50 90 M10 50 L90 50 M21 21 L79 79 M79 21 L21 79" stroke="var(--accent)" stroke-width="1" opacity="0.3"/>
            </svg>
        </div>
        <p class="loading-text">Cargando telarañas<span class="loading-dots">...</span></p>
    </div>

    <!-- MAIN CONTENT -->
    <main id="mainContent" class="main-content" hidden>

        <!-- GRID VIEW -->
        <div id="photoGrid" class="photo-grid" role="list" aria-label="Galería en cuadrícula"></div>

        <!-- FEED VIEW -->
        <div id="photoFeed" class="photo-feed" role="list" aria-label="Feed de fotos" hidden></div>

    </main>

    <!-- LIGHTBOX MODAL -->
    <div id="lightboxModal" class="lightbox-overlay" role="dialog" aria-modal="true" aria-label="Visor de imagen" hidden>
        <div class="lightbox-box">
            <button class="lightbox-close" onclick="closeLightbox()" aria-label="Cerrar">&#x2715;</button>
            <div class="lightbox-image-wrap">
                <img id="lightboxImg" src="" alt="" class="lightbox-img">
            </div>
            <div class="lightbox-info">
                <h2 id="lightboxTitle" class="lightbox-title"></h2>
                <p id="lightboxCaption" class="lightbox-caption"></p>
                <div id="lightboxTags" class="lightbox-tags"></div>
                <div class="lightbox-footer">
                    <span id="lightboxTime" class="lightbox-time"></span>
                    <button id="lightboxLikeBtn" class="like-btn" onclick="toggleLike(currentLightboxId)">
                        <span class="heart-icon">&#9825;</span>
                        <span id="lightboxLikes" class="like-count">0</span>
                    </button>
                </div>
                <div id="adminOptions" style="margin-top: 1rem; text-align: right; display: none;">
                    <button class="admin-btn" style="background: #e63946; padding: 0.5rem 1rem; width: auto;" onclick="deleteAdminPost()">🗑️ Borrar Foto</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── STATE ───────────────────────────────────────────────
        let posts = [];
        let currentView = 'grid';
        let currentLightboxId = null;

        // ─── BOOT ─────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', fetchData);

        // ─── DATA FETCH ──────────────────────────────────────────
        async function fetchData() {
            showLoading(true);
            try {
                const res = await fetch('posts.json');
                if (!res.ok) throw new Error('Network error');
                const data = await res.json();
                posts = data.map(p => ({ ...p, liked: false }));
                if (!posts.length) throw new Error('Empty');
                render();
            } catch (e) {
                document.querySelector('.loading-text').textContent = '⚠️ No se pudieron cargar los héroe. Recarga la página.';
            } finally {
                showLoading(false);
            }
        }

        function showLoading(visible) {
            document.getElementById('loadingScreen').hidden = !visible;
            document.getElementById('mainContent').hidden = visible;
        }

        // ─── RENDER ORCHESTRATOR ─────────────────────────────────
        function render() {
            renderGrid();
            renderFeed();
        }

        // ─── RENDER GRID ──────────────────────────────────────────
        function renderGrid() {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            if (!posts.length) {
                grid.innerHTML = '<p class="empty-msg">No hay posts todavía.</p>';
                return;
            }
            posts.forEach(post => {
                const item = document.createElement('div');
                item.className = 'photo-grid-item';
                item.setAttribute('role', 'listitem');
                item.setAttribute('tabindex', '0');
                item.setAttribute('aria-label', post.title);
                item.onclick = () => openLightbox(post.id);
                item.onkeydown = (e) => { if (e.key === 'Enter') openLightbox(post.id); };
                item.innerHTML = `
                    <img src="${post.img}" alt="${post.title}" loading="lazy">
                    <div class="grid-item-overlay">
                        <span class="grid-item-title">${post.title}</span>
                        <span class="grid-item-likes">&#9829; ${post.likes}</span>
                    </div>
                `;
                grid.appendChild(item);
            });
        }

        // ─── RENDER FEED ──────────────────────────────────────────
        function renderFeed() {
            const feed = document.getElementById('photoFeed');
            feed.innerHTML = '';
            if (!posts.length) {
                feed.innerHTML = '<p class="empty-msg">No hay posts todavía.</p>';
                return;
            }
            posts.forEach(post => {
                const card = document.createElement('article');
                card.className = 'feed-card';
                card.setAttribute('id', `feed-card-${post.id}`);
                card.setAttribute('role', 'listitem');
                const tagsHtml = post.tags.map(t => `<span class="feed-tag">#${t}</span>`).join('');
                const heartIcon = post.liked ? '&#9829;' : '&#9825;';
                const likedClass = post.liked ? 'liked' : '';
                card.innerHTML = `
                    <div class="feed-card-img-wrap" onclick="openLightbox(${post.id})">
                        <img src="${post.img}" alt="${post.title}" loading="lazy" class="feed-card-img">
                    </div>
                    <div class="feed-card-body">
                        <h2 class="feed-card-title">${post.title}</h2>
                        <p class="feed-card-caption">${post.caption}</p>
                        <div class="feed-card-tags">${tagsHtml}</div>
                        <div class="feed-card-footer">
                            <span class="feed-card-time">${post.time}</span>
                            <button class="like-btn ${likedClass}" id="like-btn-${post.id}" onclick="toggleLike(${post.id})" aria-label="Me gusta ${post.title}">
                                <span class="heart-icon">${heartIcon}</span>
                                <span id="like-count-${post.id}">${post.likes}</span>
                            </button>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        // ─── VIEW TOGGLE ──────────────────────────────────────────
        function setView(view) {
            currentView = view;
            const grid = document.getElementById('photoGrid');
            const feed = document.getElementById('photoFeed');
            const btnGrid = document.getElementById('btnGrid');
            const btnFeed = document.getElementById('btnFeed');

            if (view === 'grid') {
                grid.hidden = false;
                feed.hidden = true;
                btnGrid.classList.add('active');
                btnFeed.classList.remove('active');
                btnGrid.setAttribute('aria-pressed', 'true');
                btnFeed.setAttribute('aria-pressed', 'false');
            } else {
                grid.hidden = true;
                feed.hidden = false;
                btnGrid.classList.remove('active');
                btnFeed.classList.add('active');
                btnGrid.setAttribute('aria-pressed', 'false');
                btnFeed.setAttribute('aria-pressed', 'true');
            }
        }

        // ─── LIGHTBOX ────────────────────────────────────────────
        function openLightbox(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;
            currentLightboxId = id;

            document.getElementById('lightboxImg').src = post.img;
            document.getElementById('lightboxImg').alt = post.title;
            document.getElementById('lightboxTitle').textContent = post.title;
            document.getElementById('lightboxCaption').textContent = post.caption;
            document.getElementById('lightboxTime').textContent = post.time;
            document.getElementById('lightboxLikes').textContent = post.likes;

            const tagsEl = document.getElementById('lightboxTags');
            tagsEl.innerHTML = post.tags.map(t => `<span class="lightbox-tag">#${t}</span>`).join('');

            const likeBtn = document.getElementById('lightboxLikeBtn');
            likeBtn.querySelector('.heart-icon').innerHTML = post.liked ? '&#9829;' : '&#9825;';
            likeBtn.classList.toggle('liked', post.liked);

            const adminOptions = document.getElementById('adminOptions');
            adminOptions.style.display = sessionStorage.getItem('github_pat') ? 'block' : 'none';

            const modal = document.getElementById('lightboxModal');
            modal.hidden = false;
            document.body.classList.add('no-scroll');
            modal.focus();
        }

        function closeLightbox() {
            document.getElementById('lightboxModal').hidden = true;
            document.body.classList.remove('no-scroll');
            currentLightboxId = null;
        }

        // Close on overlay click
        document.getElementById('lightboxModal').addEventListener('click', function (e) {
            if (e.target === this) closeLightbox();
        });

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // ─── TOGGLE LIKE ──────────────────────────────────────────
        function toggleLike(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;

            post.liked = !post.liked;
            post.likes += post.liked ? 1 : -1;

            // Update feed button
            const feedBtn = document.getElementById(`like-btn-${id}`);
            if (feedBtn) {
                feedBtn.querySelector('.heart-icon').innerHTML = post.liked ? '&#9829;' : '&#9825;';
                feedBtn.querySelector(`#like-count-${id}`).textContent = post.likes;
                feedBtn.classList.toggle('liked', post.liked);
            }

            // Update grid overlay
            renderGrid();

            // Update lightbox if open
            if (currentLightboxId === id) {
                document.getElementById('lightboxLikes').textContent = post.likes;
                const likeBtn = document.getElementById('lightboxLikeBtn');
                likeBtn.querySelector('.heart-icon').innerHTML = post.liked ? '&#9829;' : '&#9825;';
                likeBtn.classList.toggle('liked', post.liked);
            }
        }
    </script>

    <!-- ADMIN BUTTON -->
    <button class="admin-fab" onclick="openAdminLogin()" aria-label="Abrir Panel Admin">
        ⚙️
    </button>

    <!-- ADMIN LOGIN MODAL -->
    <div id="adminLoginModal" class="lightbox-overlay" hidden>
        <div class="admin-box">
            <button class="lightbox-close" onclick="closeAdminLogin()">&#x2715;</button>
            <h2 class="admin-title">Login Administrador</h2>
            <p class="admin-desc">Introduce GitHub PAT (Permisos 'repo'). Se guarda temporalmente en sesión.</p>
            <input type="password" id="adminPat" class="admin-input" placeholder="ghp_..." autocomplete="off">
            <button class="admin-btn" onclick="verifyAdmin()">Entrar al Panel</button>
            <p id="loginError" class="admin-error" hidden>Token inválido o sin permisos.</p>
        </div>
    </div>

    <!-- ADMIN UPLOAD MODAL -->
    <div id="adminUploadModal" class="lightbox-overlay" hidden>
        <div class="admin-box admin-box-large">
            <button class="lightbox-close" onclick="closeAdminUpload()">&#x2715;</button>
            <h2 class="admin-title">Añadir Nuevo Héroe</h2>
            <div class="admin-form">
                <div class="form-group">
                    <label>1. Selecciona Imagen</label>
                    <input type="file" id="uploadFile" accept="image/jpeg, image/png, image/webp" class="admin-input" style="padding: 0.6rem;">
                </div>
                <div class="form-group">
                    <label>2. Título</label>
                    <input type="text" id="uploadTitle" class="admin-input" placeholder="Ej: Iron Man">
                </div>
                <div class="form-group">
                    <label>3. Descripción</label>
                    <textarea id="uploadCaption" class="admin-input" rows="3" placeholder="Descripción..."></textarea>
                </div>
                <div class="form-group">
                    <label>4. Etiquetas (separadas por coma)</label>
                    <input type="text" id="uploadTags" class="admin-input" placeholder="Marvel, Avenger">
                </div>
                <button class="admin-btn" id="btnSubmitUpload" onclick="submitNewPost()" style="margin-top: 10px;">🚀 Subir a GitHub</button>
                <p id="uploadStatus" class="admin-status" hidden></p>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'a242844jr-joel/Prova-login';
        
        function openAdminLogin() {
            if (sessionStorage.getItem('github_pat')) {
                openAdminUpload();
            } else {
                document.getElementById('adminLoginModal').hidden = false;
            }
        }
        
        function closeAdminLogin() {
            document.getElementById('adminLoginModal').hidden = true;
        }
        
        function openAdminUpload() {
            document.getElementById('adminLoginModal').hidden = true;
            document.getElementById('adminUploadModal').hidden = false;
        }
        
        function closeAdminUpload() {
            document.getElementById('adminUploadModal').hidden = true;
        }
        
        async function verifyAdmin() {
            const pat = document.getElementById('adminPat').value.trim();
            if (!pat) return;
            
            try {
                const pat = document.getElementById('adminPat').value.trim();
                const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}`, {
                    headers: { 
                        'Authorization': `Bearer ${pat}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (res.ok) {
                    sessionStorage.setItem('github_pat', pat);
                    document.getElementById('loginError').hidden = true;
                    openAdminUpload();
                } else {
                    const err = await res.json();
                    console.error("GitHub API Error:", err);
                    const errorEl = document.getElementById('loginError');
                    errorEl.textContent = `Token inválido o sin permisos (${res.status}).`;
                    errorEl.hidden = false;
                }
            } catch (e) {
                console.error("Fetch Error:", e);
                const errorEl = document.getElementById('loginError');
                errorEl.textContent = 'Error de red o CORS. Revisa la consola (F12).';
                errorEl.hidden = false;
            }
        }
        
        async function submitNewPost() {
            const fileInput = document.getElementById('uploadFile');
            const title = document.getElementById('uploadTitle').value.trim();
            const caption = document.getElementById('uploadCaption').value.trim();
            const tags = document.getElementById('uploadTags').value.split(',').map(t => t.trim()).filter(t => t);
            
            if (!fileInput.files.length || !title || !caption || !tags.length) {
                alert('Rellena todos los campos.');
                return;
            }
            
            const file = fileInput.files[0];
            const statusEl = document.getElementById('uploadStatus');
            const btn = document.getElementById('btnSubmitUpload');
            
            btn.disabled = true;
            statusEl.hidden = false;
            
            try {
                const pat = sessionStorage.getItem('github_pat');
                const headers = {
                    'Authorization': `Bearer ${pat}`,
                    'Accept': 'application/vnd.github.v3+json'
                };
                
                statusEl.textContent = 'Convirtiendo imagen...';
                const base64Content = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
                
                const filename = `${Date.now()}_${file.name.replace(/\\s+/g, '_')}`;
                const imgPath = `assets/${filename}`;
                statusEl.textContent = 'Subiendo imagen...';
                
                await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${imgPath}`, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({
                        message: `Upload image ${filename} via Admin Panel`,
                        content: base64Content
                    })
                });
                
                statusEl.textContent = 'Actualizando galería...';
                const jsonRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/posts.json`, { headers });
                const jsonMeta = await jsonRes.json();
                
                const contentStr = decodeURIComponent(escape(atob(jsonMeta.content)));
                const currentPosts = JSON.parse(contentStr);
                
                const newId = currentPosts.length > 0 ? Math.max(...currentPosts.map(p => p.id)) + 1 : 1;
                const newPost = {
                    id: newId,
                    img: imgPath,
                    title,
                    caption,
                    tags,
                    likes: 0,
                    liked: false,
                    time: 'Justo ahora'
                };
                
                currentPosts.unshift(newPost);
                
                const updatedJsonBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(currentPosts, null, 2))));
                await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/posts.json`, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({
                        message: `Add post "${title}" via Admin Panel`,
                        content: updatedJsonBase64,
                        sha: jsonMeta.sha
                    })
                });
                
                statusEl.textContent = '¡Felicidades, Héroe! Subido con éxito. Recargando web...';
                statusEl.style.color = '#4ade80';
                setTimeout(() => location.reload(), 2500);
                
            } catch (e) {
                console.error(e);
                statusEl.textContent = 'Error. Token PAT inválido o sin conexión.';
                statusEl.style.color = '#ff6b6b';
                btn.disabled = false;
            }
        }

        async function deleteAdminPost() {
            if (!currentLightboxId) return;
            const pat = sessionStorage.getItem('github_pat');
            if (!pat) {
                alert("No estás logueado como administrador.");
                return;
            }
            if (!confirm("🚨 ¿Seguro que quieres borrar este héroe para siempre?")) return;
            
            const btn = document.querySelector('#adminOptions .admin-btn');
            btn.textContent = "Borrando...";
            btn.disabled = true;

            try {
                const headers = {
                    'Authorization': `Bearer ${pat}`,
                    'Accept': 'application/vnd.github.v3+json'
                };
                
                const jsonRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/posts.json`, { headers });
                const jsonMeta = await jsonRes.json();
                
                const contentStr = decodeURIComponent(escape(atob(jsonMeta.content)));
                let currentPosts = JSON.parse(contentStr);
                
                // Encontrar y borrar la imagen del array
                currentPosts = currentPosts.filter(p => p.id !== currentLightboxId);
                
                const updatedJsonBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(currentPosts, null, 2))));
                await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/posts.json`, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({
                        message: `Delete post via Admin Panel`,
                        content: updatedJsonBase64,
                        sha: jsonMeta.sha
                    })
                });
                
                alert('¡Héroe eliminado!');
                location.reload();
            } catch (e) {
                console.error(e);
                alert("Error al intentar borrar el post.");
                btn.textContent = "🗑️ Borrar Foto";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
